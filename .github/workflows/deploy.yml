name: Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Upload index.html to cognitivecouncil.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: iad1-shared-b8-10.dreamhost.com
          username: cogcouncil
          password: ${{ secrets.DREAMHOST_SFTP_PASSWORD }}
          port: 22
          source: "index.html"
          target: "/home/cogcouncil/cognitivecouncil.com/"
