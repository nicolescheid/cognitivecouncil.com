<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="A thinking tool: surface what might be at play in a dilemma, then work through established exercises yourself.">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"DM Serif Display"', 'serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    }
                }

    <style>
        body > div:not(#root):not(#cookie-bar) {
            display: none !important;
        }
        * { font-family: 'DM Sans', sans-serif; }
        h1, h2, .font-display { font-family: 'DM Serif Display', serif; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInSlow {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out both; }
        .animate-fade-in-slow { animation: fadeInSlow 0.8s ease-out both; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

        /* Compact prose styling for primer / exercise text */
        .prose-tight p { margin-bottom: 0.75em; }
        .prose-tight p:last-child { margin-bottom: 0; }
        .prose-tight strong { color: #c7d2fe; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- GDPR Cookie Bar - non-blocking bottom strip -->
    <div id="cookie-bar"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_URL = 'https://api.cognitivecouncil.com/api/chat';

        // ─── Cookie Consent (non-blocking bottom strip) ───
        const CookieBar = () => {
            const [visible, setVisible] = useState(false);

            useEffect(() => {
                const consent = localStorage.getItem('cookieConsent');
                if (consent === null) {
                    setVisible(true);
                } else if (consent === 'accepted') {
                    loadGA();
                }
            }, []);

            const loadGA = () => {
                if (!document.getElementById('ga-script')) {
                    const script = document.createElement('script');
                    script.id = 'ga-script';
                    script.async = true;
                    script.src = 'https://www.googletagmanager.com/gtag/js?id=G-4SV24T4CSY';
                    document.head.appendChild(script);
                    window.dataLayer = window.dataLayer || [];
                    function gtag(){dataLayer.push(arguments);}
                    window.gtag = gtag;
                    gtag('js', new Date());
                    gtag('config', 'G-4SV24T4CSY');
                }
            };

            if (!visible) return null;

            return (
                <div className="fixed bottom-0 left-0 right-0 z-50 bg-slate-900/95 backdrop-blur-sm border-t border-slate-700/50 px-4 py-3">
                    <div className="max-w-4xl mx-auto flex items-center justify-between gap-4 flex-wrap">
                        <p className="text-slate-300 text-sm flex-1 min-w-[200px]">
                            We use Google Analytics to improve this experience.{' '}
                            <a href="https://policies.google.com/technologies/cookies" target="_blank" rel="noopener" className="text-blue-400 hover:text-blue-300 underline">
                                Learn more
                            </a>
                        </p>
                        <div className="flex gap-2">
                            <button
                                onClick={() => { localStorage.setItem('cookieConsent', 'accepted'); setVisible(false); loadGA(); }}
                                className="px-4 py-1.5 bg-blue-500/80 hover:bg-blue-500 text-white text-sm rounded-lg transition-colors"
                            >
                                Accept
                            </button>
                            <button
                                onClick={() => { localStorage.setItem('cookieConsent', 'declined'); setVisible(false); }}
                                className="px-4 py-1.5 bg-slate-700/50 hover:bg-slate-700 text-slate-300 text-sm rounded-lg transition-colors"
                            >
                                Decline
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ═══════════════════════════════════════════════════════════════
        //  THE ENGINE (never narrates a verdict about the user)
        // ═══════════════════════════════════════════════════════════════

        // ─── Vetted, static primer set ───
        // This array is BOTH the lightbox content AND the whitelist of
        // mechanisms the model is permitted to name. Mechanism-level,
        // hedged, framed around evolutionary mismatch. Names a tradition,
        // never a specific study. Copy is first-draft pending Nic's vet.
        const primers = [
            {
                id: 'loss-aversion',
                name: 'Loss aversion',
                short: 'We feel a loss more sharply than an equivalent gain.',
                body: `Most people will work harder to avoid losing something than to gain something of the same size — a loss tends to register as noticeably more significant than an equivalent win. It's one of the more durable findings in behavioural science.

It likely made sense in an environment where a lost resource could be the difference between surviving the winter and not. In a modern decision, the same wiring can make you cling to an option mainly because walking away *feels* like a loss — even when the option itself no longer serves you. Noticing that pull is sometimes enough to weigh the actual stakes more evenly.`
            },
            {
                id: 'present-bias',
                name: 'Present bias',
                short: 'The near term feels far more vivid and urgent than the future.',
                body: `We tend to weight what's immediate much more heavily than what's distant, and a future reward seems to shrink the further off it is. Behavioural scientists call this present bias, or temporal discounting.

For most of human history the future was genuinely uncertain, so favouring the sure thing in front of you was reasonable. Today the same tilt can quietly undercut choices whose payoff is real but delayed — the version of you deciding and the version who lives with it can feel like different people. Naming the gap doesn't close it, but it can bring the future self a little more into the room.`
            },
            {
                id: 'sunk-cost',
                name: 'The sunk-cost effect',
                short: 'Past investment pulls on choices it shouldn’t really touch.',
                body: `Once we've put time, money, or effort into something, we find it disproportionately hard to walk away — even when the smart move forward ignores what's already spent. This is the sunk-cost effect.

A reluctance to waste hard-won resources was a sensible instinct in leaner times. But a forward-looking decision depends only on what happens next, not on what's already gone. When you notice yourself justifying a path mainly by how much you've already put in, it can help to ask what you'd choose if you were arriving at it fresh today.`
            },
            {
                id: 'status-quo',
                name: 'Status-quo bias',
                short: 'Doing nothing feels safer than it often is.',
                body: `We carry a measurable pull toward leaving things as they are. A change that goes wrong tends to sting more than a missed improvement, so the default option quietly carries an advantage in our minds.

When the world around us changed slowly, staying put was usually low-risk. In a faster-moving life, inaction is still a choice with consequences — it just doesn't feel like one, because nothing visibly *happened*. It can be worth asking whether you'd actively choose your current situation if it weren't already the default.`
            },
            {
                id: 'negativity-bias',
                name: 'Negativity bias',
                short: 'Bad news lands harder and lingers longer than good.',
                body: `Threats, criticisms, and setbacks tend to grab more of our attention and stay with us longer than positives of equal size. Negativity bias is one of the better-established tendencies in psychology.

An ancestor who paid more attention to danger than to pleasant things was more likely to survive to pass that wiring on. The cost today is that a single sharp comment or worst-case scenario can crowd out a more balanced read of a situation. Knowing the scales are tilted can be a reason to deliberately give the fuller picture its due weight.`
            },
            {
                id: 'affective-forecasting',
                name: 'The affective-forecasting error',
                short: 'We’re surprisingly bad at predicting how we’ll feel later.',
                body: `When we imagine future outcomes, we tend to overestimate how intensely — and how long — they'll affect us. Good news rarely lifts us as much or as lastingly as expected; feared outcomes are often more survivable than they look from here. Researchers call the gap an affective-forecasting error.

We seem built to simulate the future vividly enough to motivate action, not to predict our feelings accurately. That's useful for getting us moving, less useful when dread of an outcome is doing more to drive a decision than the outcome itself would warrant. It can help to ask how you've actually felt after similar moments in the past.`
            },
            {
                id: 'social-threat',
                name: 'Social threat & belonging',
                short: 'Rejection and exclusion can register almost like physical danger.',
                body: `Humans are unusually attuned to where we stand with others. Signals of disapproval, exclusion, or lost standing can trigger a stress response out of proportion to any practical harm, because for most of our history belonging to the group was a survival matter.

In a modern life with many overlapping groups and far weaker stakes, that same sensitivity can make social risk feel larger than it is — and can steer decisions toward whatever avoids disapproval. Recognising when a choice is being driven by how it will land socially, rather than by its own merits, can restore some perspective.`
            }
        ];

        // ─── Blocklist: discredited / outdated techniques the model must not recommend ───
        const BLOCKLIST = [
            'critical incident stress debriefing',
            'catharsis or venting as emotional release ("getting it all out")',
            'rebirthing or other regression therapies',
            'subliminal-message or "trapped emotion" / energy-clearing techniques',
            'personality typing (e.g. MBTI, Enneagram) used as diagnosis',
            'positive affirmations used as a standalone fix'
        ];

        // ─── Fallback exercises if the model call/parse fails (established, broadly applicable) ───
        const FALLBACK_EXERCISES = [
            { name: 'Premortem', tradition: 'behavioural science', one_line: 'Imagine the decision has already failed, and work backward to find why.', why_it_fits: 'A broadly useful way to surface risks before you commit.' },
            { name: 'Expressive writing', tradition: 'health psychology', one_line: 'Write freely about the situation for a set time, without editing.', why_it_fits: 'Helps order thoughts when a situation feels tangled.' }
        ];

        // ─── Main Component ───
        const CognitiveCouncil = () => {
            const [stage, setStage] = useState('welcome');
            const [initialQuery, setInitialQuery] = useState('');
            const [generatedQuestions, setGeneratedQuestions] = useState([]);
            const [answers, setAnswers] = useState({});
            const [contextualAnswers, setContextualAnswers] = useState([]);
            const [enrichedPromptCache, setEnrichedPromptCache] = useState('');
            const [loading, setLoading] = useState(false);
            const [loadingMessage, setLoadingMessage] = useState('');

            // Guide stage
            const [guide, setGuide] = useState(null);          // { thin_input, relevant_mechanisms[], exercises[] }
            const [guideLoading, setGuideLoading] = useState(false);
            const [openPrimerId, setOpenPrimerId] = useState(null);

            // Exercise stage
            const [activeExercise, setActiveExercise] = useState(null);  // { name, tradition, ... }
            const [exerciseData, setExerciseData] = useState(null);      // { intro, steps[], closing }
            const [exerciseLoading, setExerciseLoading] = useState(false);
            const [exerciseAnswers, setExerciseAnswers] = useState({});
            const [exerciseStepIndex, setExerciseStepIndex] = useState(0);

            const [toast, setToast] = useState(null);
            const [resumeAvailable, setResumeAvailable] = useState(null);
            const hasRestoredRef = useRef(false);

            const STORAGE_KEY = 'cognitive_council_session_v3';
            const SESSION_TTL_MS = 24 * 60 * 60 * 1000;

            const showToast = (message, type = 'error') => {
                setToast({ message, type, id: Date.now() });
            };

            useEffect(() => {
                if (!toast) return;
                const t = setTimeout(() => setToast(null), 4500);
                return () => clearTimeout(t);
            }, [toast]);

            const renderMarkdown = (text) => {
                const html = marked.parse(text || '');
                return window.DOMPurify ? DOMPurify.sanitize(html) : html;
            };

            // ─── Loading Messages ───
            const loadingMessages = [
                "Reticulating splines...",
                "Reading what you wrote...",
                "Looking for what might be at play...",
                "Finding exercises that fit...",
                "Mapping the terrain...",
                "Setting the table, not laying the verdict...",
                "Sorting the established from the outdated...",
                "Building you a map, not an oracle..."
            ];

            const getRandomLoadingMessage = () =>
                loadingMessages[Math.floor(Math.random() * loadingMessages.length)];

            // ─── API Helper (with retry + exponential backoff) ───
            const callAPI = async (message, systemRole, { retries = 2, signal } = {}) => {
                let lastError;
                for (let attempt = 0; attempt <= retries; attempt++) {
                    try {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message, systemRole }),
                            signal
                        });
                        if (!response.ok) {
                            if (response.status >= 400 && response.status < 500) {
                                throw new Error(`Request failed (${response.status})`);
                            }
                            throw new Error(`Server error (${response.status})`);
                        }
                        const data = await response.json();
                        if (data.type === 'error' || data.error) {
                            throw new Error(data.error?.message || JSON.stringify(data.error) || 'API error');
                        }
                        return data.response || data.content || data.message || JSON.stringify(data);
                    } catch (err) {
                        lastError = err;
                        if (err.name === 'AbortError') throw err;
                        if (attempt === retries) break;
                        const delay = 800 * Math.pow(2.5, attempt) + Math.random() * 300;
                        await new Promise(r => setTimeout(r, delay));
                    }
                }
                throw lastError;
            };

            const parseJSON = (raw) => {
                const cleaned = (raw || '').replace(/```json\n?|\n?```/g, '').trim();
                return JSON.parse(cleaned);
            };

            // ─── Stage: Welcome → Query ───
            const proceedToQuery = () => setStage('query');

            // ─── Stage: Query → Questions (two-step intake: internal analysis, then questions) ───
            const handleInitialSubmit = async (e) => {
                e.preventDefault();
                if (!initialQuery.trim()) return;

                setLoading(true);
                setLoadingMessage(getRandomLoadingMessage());

                try {
                    // STEP 1 (internal only — never shown to the user): understand the dilemma well
                    // enough to ask good questions. This is question-quality scaffolding, not a verdict.
                    const analysisPrompt = `You are a perceptive intake analyst. A person has brought a specific dilemma or decision to a thinking tool:

"${initialQuery}"

Before we generate intake questions, privately analyse what's going on. This analysis is internal scaffolding to help us ask better questions — it is NEVER shown to the person and is NOT a diagnosis. Respond with a brief JSON object:
{
  "stated_question": "What they're explicitly asking",
  "likely_real_question": "What they may actually be grappling with underneath the framing",
  "key_assumptions": ["Assumptions they seem to be making that could be examined"],
  "missing_context": ["Specific context that would genuinely sharpen the help we can offer"],
  "emotional_layer": "What feelings may be driving this but haven't been stated",
  "pattern_signal": "Any sign this might be a recurring pattern rather than a one-off situation",
  "framing_bias": "How they've framed this — and what reframing might reveal"
}

Be specific to THIS dilemma. No generic observations. JSON only, no markdown.`;

                    let analysis;
                    try {
                        analysis = parseJSON(await callAPI(analysisPrompt, 'intake_analyst'));
                    } catch (e) {
                        analysis = {
                            stated_question: initialQuery,
                            likely_real_question: "Unclear — need more context",
                            key_assumptions: [],
                            missing_context: ["Situational details", "Emotional stakes", "Prior attempts"],
                            emotional_layer: "Not yet surfaced",
                            pattern_signal: "Unknown",
                            framing_bias: "Unknown"
                        };
                    }

                    setLoadingMessage(getRandomLoadingMessage());

                    // STEP 2: generate intake questions. The person does the thinking here.
                    const questionPrompt = `You are a Socratic intake specialist. A person has brought a specific dilemma or decision they're working through. Your job is to ask questions that help THEM think more clearly about it — and that gather enough context to later suggest established exercises suited to their situation.

The person said: "${initialQuery}"

Your private read of what's going on (do NOT reference it directly):
${JSON.stringify(analysis, null, 2)}

Generate exactly 4 questions. Each serves a distinct purpose:
1. ONE that surfaces the emotional layer — what this actually feels like, what's personally at stake (not just practically).
2. ONE that probes for patterns — has something like this happened before? Is there a recurring theme?
3. ONE that tests the framing — gently challenges an assumption they're making, or offers a reframe. "You've described this as X — could it also be Y?"
4. ONE that asks for concrete specifics — timeline, constraints, what's already been tried.

CRITICAL RULES:
- Every question must be specific to THIS person's exact situation. No generic coaching questions.
- Sound like a curious, perceptive friend — not a therapist or a form.
- Don't ask "What does success look like?" or "What are your values?" — overused and vague.
- The placeholder hints at the KIND of answer that helps, not a repeat of the question.
- If their question already contains rich context, don't ask for what they've already provided.

Respond with ONLY a JSON array:
[{"question": "...", "placeholder": "Hint..."}]`;

                    let questions;
                    try {
                        questions = parseJSON(await callAPI(questionPrompt, 'question_generator'));
                    } catch (e) {
                        questions = [
                            { question: "What does this situation actually feel like when you sit with it — not what you think about it, but how it feels?", placeholder: "The emotional reality, not the logical framing..." },
                            { question: "Have you been in a similar situation before? What happened?", placeholder: "Previous patterns or echoes of this..." },
                            { question: "You've framed this in a particular way — is there another way to see it that you've been avoiding?", placeholder: "The reframe you haven't let yourself consider..." },
                            { question: "What's the most concrete, specific detail about this situation that you haven't mentioned yet?", placeholder: "The specifics that would change the picture..." }
                        ];
                    }
                    setGeneratedQuestions(questions);
                    setStage('questions');
                } catch (error) {
                    console.error('Error generating questions:', error);
                    showToast('Something went wrong generating questions. Please try again.');
                } finally {
                    setLoading(false);
                }
            };

            // ─── Stage: Questions → Guide ───
            const submitIntake = async () => {
                const saved = generatedQuestions.map((q, idx) => ({
                    question: q.question,
                    answer: answers[idx] || ''
                }));
                setContextualAnswers(saved);

                let enriched = `Dilemma: ${initialQuery}\n\nContext gathered through intake:\n`;
                generatedQuestions.forEach((q, idx) => {
                    enriched += `\nQ: ${q.question}\nA: ${answers[idx] || '(no answer provided)'}\n`;
                });
                setEnrichedPromptCache(enriched);

                setStage('guide');
                setGuide(null);
                setGuideLoading(true);
                setLoadingMessage(getRandomLoadingMessage());

                const prompt = `You are the engine behind a tool that helps a person think through a specific dilemma THEMSELVES. You do NOT analyse the person, deliver verdicts, or interpret them. You do two practical things: (a) decide which cognitive mechanisms — if any — are worth them understanding, and (b) recommend established exercises they can work through on their own.

Their dilemma: "${initialQuery}"

Context they shared:
${enriched}

PART A — MECHANISMS (gated, conditional):
You may name mechanisms ONLY from this fixed list:
${primers.map(p => `- ${p.id}: ${p.name} — ${p.short}`).join('\n')}

Include a mechanism's id ONLY if BOTH are true:
1. It is widely acknowledged that this mechanism is likely relevant to situations of this kind, AND
2. Understanding it would genuinely help THIS person make sense of their situation.
If neither clearly holds, return an EMPTY list. Returning nothing is correct and common — do NOT force a connection to fill space. Never name a mechanism outside the list.

PART B — EXERCISES (2 or 3):
Recommend established, currently-practised exercises from named evidence-based traditions (e.g. CBT, ACT, behavioural science, Stoic practice). Rules:
- Name the TRADITION, not a specific study or paper.
- Use only recognised techniques in current professional use. Do NOT invent exercises.
- Do NOT recommend any of these discredited or outdated techniques: ${BLOCKLIST.join('; ')}.
- Tailor "why_it_fits" using the person's OWN words/details from their context.
- These are tools the person works through themselves — never frame them as analysis you will perform.

THIN INPUT: If their answers are mostly empty or very thin, set "thin_input": true and choose broadly-applicable exercises.

Respond with ONLY this JSON, no markdown:
{
  "thin_input": false,
  "relevant_mechanisms": ["id"],
  "exercises": [
    {"name": "...", "tradition": "...", "one_line": "...", "why_it_fits": "..."}
  ]
}`;

                try {
                    const parsed = parseJSON(await callAPI(prompt, 'guide_select'));
                    // Client-side whitelist enforcement — extra fence on Decision 1
                    const validIds = new Set(primers.map(p => p.id));
                    parsed.relevant_mechanisms = (parsed.relevant_mechanisms || []).filter(id => validIds.has(id));
                    parsed.exercises = (parsed.exercises || []).slice(0, 3);
                    if (parsed.exercises.length === 0) parsed.exercises = FALLBACK_EXERCISES;
                    setGuide(parsed);
                } catch (error) {
                    console.error('Guide error:', error);
                    setGuide({ thin_input: true, relevant_mechanisms: [], exercises: FALLBACK_EXERCISES, degraded: true });
                    showToast('Had trouble tailoring this — showing broadly useful exercises instead.');
                } finally {
                    setGuideLoading(false);
                }
            };

            // ─── Stage: Guide → Exercise (interactive step-through) ───
            const startExercise = async (ex) => {
                setActiveExercise(ex);
                setExerciseData(null);
                setExerciseAnswers({});
                setExerciseStepIndex(0);
                setStage('exercise');
                setExerciseLoading(true);
                window.scrollTo({ top: 0, behavior: 'instant' });

                const prompt = `A person has chosen to work through an established exercise on their own, about a specific dilemma. Produce a clear, interactive scaffold for "${ex.name}" (tradition: ${ex.tradition}) that THEY fill in. You provide structure and prompts only — you do NOT answer for them, interpret their situation, or analyse them.

Their dilemma: "${initialQuery}"
Context they shared:
${enrichedPromptCache}

Produce the exercise as a series of steps. Each step is an instruction plus a question for them to answer in their own words. Keep it faithful to how this technique is actually practised. Customise the wording to their situation using their own details where natural, but never fill in their answers for them.

Respond with ONLY this JSON, no markdown:
{
  "name": "${ex.name}",
  "tradition": "${ex.tradition}",
  "intro": "1-2 sentences: what this exercise is and what working through it does. No interpretation of the person.",
  "steps": [
    {"prompt": "The instruction/question for this step", "placeholder": "a hint at the kind of answer", "guidance": "optional one-line tip, or empty string"}
  ],
  "closing": "1-2 sentences on what to do with what they've written — a question to sit with or a suggestion to revisit. NEVER an interpretation of their answers."
}
Aim for 3 to 6 steps.`;

                try {
                    const parsed = parseJSON(await callAPI(prompt, 'exercise_build'));
                    if (!Array.isArray(parsed.steps) || parsed.steps.length === 0) throw new Error('No steps');
                    setExerciseData(parsed);
                } catch (error) {
                    console.error('Exercise build error:', error);
                    setExerciseData({ error: true });
                    showToast('Could not load this exercise. Please try again.');
                } finally {
                    setExerciseLoading(false);
                }
            };

            const exerciseTotalSteps = exerciseData?.steps?.length || 0;
            const onReview = exerciseData && !exerciseData.error && exerciseStepIndex >= exerciseTotalSteps;

            // ─── Export the USER'S OWN work (open loop — no AI interpretation) ───
            const buildExerciseText = () => {
                let t = `${exerciseData.name.toUpperCase()} — your work\n${'='.repeat(40)}\n\n`;
                t += `Dilemma: ${initialQuery}\n\n${'='.repeat(40)}\n\n`;
                exerciseData.steps.forEach((s, i) => {
                    t += `${i + 1}. ${s.prompt}\n${exerciseAnswers[i]?.trim() || '(left blank)'}\n\n`;
                });
                return t;
            };

            const copyExercise = () => {
                navigator.clipboard.writeText(buildExerciseText())
                    .then(() => showToast('Copied your work to the clipboard.', 'success'))
                    .catch(err => showToast('Copy failed: ' + (err?.message || err)));
            };

            const downloadExercisePDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let y = 20; const lh = 6; const mw = 180; const ph = doc.internal.pageSize.height;
                doc.setFontSize(16); doc.setFont(undefined, 'bold');
                doc.text(exerciseData.name, 105, y, { align: 'center' }); y += lh + 2;
                doc.setFontSize(9); doc.setFont(undefined, 'italic');
                doc.text(`${exerciseData.tradition} · your own responses`, 105, y, { align: 'center' }); y += lh + 6;
                doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.text('Dilemma:', 15, y); y += lh;
                doc.setFont(undefined, 'italic');
                const ql = doc.splitTextToSize(initialQuery, mw); doc.text(ql, 15, y); y += ql.length * lh + 8;
                doc.setFont(undefined, 'normal');
                exerciseData.steps.forEach((s, i) => {
                    if (y > ph - 40) { doc.addPage(); y = 20; }
                    doc.setFontSize(10); doc.setFont(undefined, 'bold');
                    const pl = doc.splitTextToSize(`${i + 1}. ${s.prompt}`, mw);
                    pl.forEach(line => { if (y > ph - 20) { doc.addPage(); y = 20; } doc.text(line, 15, y); y += lh; });
                    doc.setFontSize(10); doc.setFont(undefined, 'normal');
                    const al = doc.splitTextToSize(exerciseAnswers[i]?.trim() || '(left blank)', mw);
                    al.forEach(line => { if (y > ph - 20) { doc.addPage(); y = 20; } doc.text(line, 15, y); y += lh; });
                    y += 6;
                });
                doc.save(`${exerciseData.name.toLowerCase().replace(/\s+/g, '-')}-my-work.pdf`);
            };

            // ─── Reset ───
            const resetAll = () => {
                setStage('query');
                setInitialQuery('');
                setGeneratedQuestions([]);
                setAnswers({});
                setContextualAnswers([]);
                setEnrichedPromptCache('');
                setGuide(null);
                setOpenPrimerId(null);
                setActiveExercise(null);
                setExerciseData(null);
                setExerciseAnswers({});
                setExerciseStepIndex(0);
                try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
            };

            // ─── Scroll to top on stage change ───
            useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'instant' });
            }, [stage]);

            // ─── Session restore on mount ───
            useEffect(() => {
                if (hasRestoredRef.current) return;
                hasRestoredRef.current = true;
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (!raw) return;
                    const session = JSON.parse(raw);
                    if (!session?.timestamp || Date.now() - session.timestamp > SESSION_TTL_MS) {
                        localStorage.removeItem(STORAGE_KEY);
                        return;
                    }
                    if (!session.stage || session.stage === 'welcome') return;
                    setResumeAvailable(session);
                } catch (e) {
                    try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
                }
            }, []);

            const resumeSession = () => {
                if (!resumeAvailable) return;
                const s = resumeAvailable;
                setInitialQuery(s.initialQuery || '');
                setGeneratedQuestions(s.generatedQuestions || []);
                setAnswers(s.answers || {});
                setContextualAnswers(s.contextualAnswers || []);
                setEnrichedPromptCache(s.enrichedPromptCache || '');
                setGuide(s.guide || null);
                setActiveExercise(s.activeExercise || null);
                setExerciseData(s.exerciseData || null);
                setExerciseAnswers(s.exerciseAnswers || {});
                setExerciseStepIndex(s.exerciseStepIndex || 0);
                // Don't resume into a transient loading stage
                const safeStage = (s.stage === 'guide' && !s.guide) ? 'questions'
                    : (s.stage === 'exercise' && !s.exerciseData) ? 'guide'
                    : s.stage;
                setStage(safeStage);
                setResumeAvailable(null);
            };

            const dismissResume = () => {
                setResumeAvailable(null);
                try { localStorage.removeItem(STORAGE_KEY); } catch (_) {}
            };

            // ─── Session save ───
            useEffect(() => {
                if (!hasRestoredRef.current) return;
                if (stage === 'welcome') return;
                if (resumeAvailable) return;
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        stage, initialQuery, generatedQuestions, answers, contextualAnswers,
                        enrichedPromptCache, guide, activeExercise, exerciseData,
                        exerciseAnswers, exerciseStepIndex, timestamp: Date.now()
                    }));
                } catch (e) { /* quota or storage disabled — silent */ }
            }, [stage, initialQuery, generatedQuestions, answers, contextualAnswers, enrichedPromptCache, guide, activeExercise, exerciseData, exerciseAnswers, exerciseStepIndex, resumeAvailable]);

            const openPrimer = openPrimerId ? primers.find(p => p.id === openPrimerId) : null;

            // ═══════════════════════════════════════
            //  RENDER
            // ═══════════════════════════════════════

            return (
                <div className="min-h-screen bg-gradient-to-b from-slate-950 via-slate-900 to-indigo-950 font-body">
                    <CookieBar />

                    {/* Toast notifications */}
                    {toast && (
                        <div
                            key={toast.id}
                            role="status"
                            aria-live="polite"
                            className={`fixed top-4 right-4 z-50 max-w-sm px-4 py-3 rounded-xl shadow-lg backdrop-blur-sm border animate-fade-in text-sm ${
                                toast.type === 'success'
                                    ? 'bg-emerald-500/90 border-emerald-400/40 text-white'
                                    : 'bg-rose-500/90 border-rose-400/40 text-white'
                            }`}
                        >
                            <div className="flex items-start gap-3">
                                <span className="flex-1">{toast.message}</span>
                                <button
                                    onClick={() => setToast(null)}
                                    className="text-white/80 hover:text-white text-lg leading-none"
                                    aria-label="Dismiss"
                                >×</button>
                            </div>
                        </div>
                    )}

                    {/* ─── Primer lightbox ─── */}
                    {openPrimer && (
                        <div
                            className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm animate-fade-in-slow"
                            onClick={() => setOpenPrimerId(null)}
                            role="dialog"
                            aria-modal="true"
                        >
                            <div
                                className="bg-slate-900 border border-indigo-400/20 rounded-2xl max-w-lg w-full max-h-[85vh] overflow-y-auto p-6 sm:p-8 shadow-2xl animate-fade-in"
                                onClick={(e) => e.stopPropagation()}
                            >
                                <div className="flex items-start justify-between gap-4 mb-1">
                                    <h3 className="font-display text-2xl text-white">{openPrimer.name}</h3>
                                    <button
                                        onClick={() => setOpenPrimerId(null)}
                                        className="text-slate-500 hover:text-white text-2xl leading-none -mt-1"
                                        aria-label="Close"
                                    >×</button>
                                </div>
                                <p className="text-indigo-300/80 text-sm italic mb-4">{openPrimer.short}</p>
                                <div
                                    className="prose-tight text-slate-300 leading-relaxed text-[15px]"
                                    dangerouslySetInnerHTML={{ __html: renderMarkdown(openPrimer.body) }}
                                />
                                <p className="text-slate-500 text-xs mt-6 pt-4 border-t border-white/10">
                                    Offered as a possibility, not a diagnosis. This is a short, mechanism-level sketch — not the whole science.
                                </p>
                            </div>
                        </div>
                    )}

                    <div className="max-w-3xl mx-auto px-4 py-8 sm:px-6 lg:px-8">

                        {/* Resume previous session banner */}
                        {resumeAvailable && stage === 'welcome' && (
                            <div className="bg-indigo-500/10 border border-indigo-400/30 rounded-2xl p-4 mb-6 animate-fade-in">
                                <div className="flex items-start gap-3 flex-wrap">
                                    <div className="flex-1 min-w-[200px]">
                                        <p className="text-indigo-200 text-sm font-medium mb-1">Pick up where you left off?</p>
                                        <p className="text-slate-400 text-xs italic">"{(resumeAvailable.initialQuery || '').substring(0, 120)}{(resumeAvailable.initialQuery || '').length > 120 ? '…' : ''}"</p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button
                                            onClick={resumeSession}
                                            className="px-4 py-1.5 bg-indigo-500/30 hover:bg-indigo-500/40 text-indigo-100 text-sm rounded-lg transition-colors border border-indigo-400/40"
                                        >Resume</button>
                                        <button
                                            onClick={dismissResume}
                                            className="px-3 py-1.5 text-slate-400 hover:text-slate-200 text-sm transition-colors"
                                        >Start fresh</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ─── WELCOME STAGE ─── */}
                        {stage === 'welcome' && (
                            <div className="min-h-[80vh] flex flex-col justify-center animate-fade-in">
                                <div className="text-center mb-12">
                                    <div className="flex justify-center mb-8">
                                        <div className="relative">
                                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" className="w-20 h-20">
                                                <defs>
                                                    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                                        <stop offset="0%" style={{stopColor:'#60a5fa', stopOpacity:1}} />
                                                        <stop offset="100%" style={{stopColor:'#818cf8', stopOpacity:1}} />
                                                    </linearGradient>
                                                </defs>
                                                <g fill="url(#brainGrad)">
                                                    <path d="M 30 35 Q 25 35 22 40 Q 20 45 20 50 Q 20 58 24 64 Q 28 70 35 72 Q 42 74 50 74 Q 58 74 65 72 Q 72 70 76 64 Q 80 58 80 50 Q 80 45 78 40 Q 75 35 70 35 Q 68 30 65 27 Q 60 24 55 24 Q 50 23 45 24 Q 40 24 35 27 Q 32 30 30 35 Z"/>
                                                    <circle cx="32" cy="42" r="6" opacity="0.3"/>
                                                    <circle cx="28" cy="54" r="5" opacity="0.3"/>
                                                    <circle cx="68" cy="42" r="6" opacity="0.3"/>
                                                    <circle cx="72" cy="54" r="5" opacity="0.3"/>
                                                    <circle cx="42" cy="32" r="4" opacity="0.3"/>
                                                    <circle cx="58" cy="32" r="4" opacity="0.3"/>
                                                </g>
                                                <g>
                                                    <circle cx="40" cy="48" r="4" fill="white"/>
                                                    <circle cx="60" cy="48" r="4" fill="white"/>
                                                    <circle cx="41.5" cy="47" r="1.5" fill="#1e1b4b"/>
                                                    <circle cx="61.5" cy="47" r="1.5" fill="#1e1b4b"/>
                                                    <circle cx="39.5" cy="46.5" r="1" fill="white"/>
                                                    <circle cx="59.5" cy="46.5" r="1" fill="white"/>
                                                    <ellipse cx="32" cy="52" rx="3" ry="2" fill="#93c5fd" opacity="0.4"/>
                                                    <ellipse cx="68" cy="52" rx="3" ry="2" fill="#93c5fd" opacity="0.4"/>
                                                    <path d="M 42 58 Q 50 62 58 58" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round"/>
                                                </g>
                                            </svg>
                                        </div>
                                    </div>

                                    <h1 className="font-display text-4xl sm:text-5xl text-white mb-3">
                                        Cognitive Council
                                    </h1>
                                    <div className="flex items-center justify-center gap-3 mb-8">
                                        <span className="px-3 py-1 bg-blue-500/20 text-blue-300 text-xs font-semibold rounded-full border border-blue-400/30 tracking-wider uppercase">
                                            Beta
                                        </span>
                                    </div>
                                </div>

                                <div className="max-w-xl mx-auto space-y-6 text-center">
                                    <p className="text-slate-300 text-lg leading-relaxed animate-fade-in delay-100">
                                        This isn't a chatbot, and it won't tell you what to do. It's a thinking tool. Describe the dilemma you're facing, answer a few questions, and it points you toward the mental tendencies that <em>might</em> be at play — and established exercises you can work through yourself.
                                    </p>
                                    <p className="text-slate-400 leading-relaxed animate-fade-in delay-200">
                                        The thinking stays yours. Think of the Council as the council of your own mind — the systems that quietly shape how you decide. This is a map and a librarian, not an oracle.
                                    </p>
                                    <div className="pt-4 animate-fade-in delay-300">
                                        <p className="text-slate-500 text-sm mb-8 tracking-wide">
                                            A few questions · what might be at play · exercises you work yourself
                                        </p>
                                    </div>
                                    <button
                                        onClick={proceedToQuery}
                                        className="animate-fade-in delay-400 px-8 py-3.5 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-medium rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all shadow-lg shadow-blue-500/20 hover:shadow-blue-500/30"
                                    >
                                        Begin →
                                    </button>
                                </div>

                                <div className="mt-16 text-center animate-fade-in delay-500">
                                    <p className="text-slate-600 text-xs">
                                        Created by Nicole Scheid & Claude (Anthropic) · v3.0
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* ─── QUERY STAGE ─── */}
                        {stage === 'query' && (
                            <div className="animate-fade-in">
                                <div className="text-center mb-8">
                                    <h2 className="font-display text-3xl text-white mb-2">What's on your mind?</h2>
                                    <p className="text-slate-400">A decision, a question, something you're stuck on — describe it however feels natural.</p>
                                </div>

                                {loading ? (
                                    <div className="text-center py-16">
                                        <div className="flex justify-center mb-6">
                                            <div className="w-3 h-3 bg-blue-400 rounded-full animate-pulse" />
                                        </div>
                                        <p className="text-white text-lg mb-2">{loadingMessage}</p>
                                        <p className="text-slate-500 text-sm">Reading what you wrote and shaping a few questions… 20-40 seconds.</p>
                                    </div>
                                ) : (
                                    <div className="bg-white/5 backdrop-blur rounded-2xl p-6 sm:p-8 border border-white/10">
                                        <form onSubmit={handleInitialSubmit}>
                                            <textarea
                                                value={initialQuery}
                                                onChange={(e) => setInitialQuery(e.target.value)}
                                                placeholder="Describe what you're thinking about, as openly as you can..."
                                                className="w-full h-32 bg-white/5 text-white placeholder-slate-500 rounded-xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-500/50 border border-white/10 resize-none"
                                                autoFocus
                                            />
                                            <button
                                                type="submit"
                                                disabled={!initialQuery.trim()}
                                                className="mt-4 w-full bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-medium py-3.5 rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                                            >
                                                Continue →
                                            </button>
                                        </form>

                                        <div className="mt-6 pt-6 border-t border-white/10 text-slate-500 text-sm space-y-2">
                                            <p className="text-slate-400 text-xs uppercase tracking-wider mb-3">Or start with one of these:</p>
                                            <p className="cursor-pointer hover:text-slate-300 transition-colors" onClick={() => setInitialQuery("I'm thinking about making a career change but I'm not sure if it's the right time.")}>
                                                💭 I'm thinking about a career change but I'm not sure if it's the right time
                                            </p>
                                            <p className="cursor-pointer hover:text-slate-300 transition-colors" onClick={() => setInitialQuery("I have a conflict with a colleague and I'm not sure how to handle it.")}>
                                                💭 I have a conflict with a colleague and I'm not sure how to handle it
                                            </p>
                                            <p className="cursor-pointer hover:text-slate-300 transition-colors" onClick={() => setInitialQuery("I keep starting things and not finishing them and I want to understand why.")}>
                                                💭 I keep starting things and not finishing them and I want to understand why
                                            </p>
                                            <p className="cursor-pointer hover:text-slate-300 transition-colors" onClick={() => setInitialQuery("I need to make a big decision and I feel paralysed by the options.")}>
                                                💭 I need to make a big decision and I feel paralysed by the options
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ─── QUESTIONS STAGE (Socratic Intake) ─── */}
                        {stage === 'questions' && (
                            <div className="animate-fade-in">
                                <div className="mb-8">
                                    <h2 className="font-display text-2xl text-white mb-2">Let's build some context first</h2>
                                    <p className="text-slate-400 text-sm">
                                        A few questions about your situation. Your answers stay in your browser and help surface what might be relevant — and which exercises actually fit. Answer what resonates; skip anything that doesn't.
                                    </p>
                                    <div className="mt-4 p-4 bg-white/5 rounded-lg border border-white/10">
                                        <p className="text-slate-300 italic">"{initialQuery}"</p>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    {generatedQuestions.map((q, idx) => (
                                        <div key={idx} className="animate-fade-in" style={{animationDelay: `${idx * 100}ms`}}>
                                            <label className="text-white font-medium block mb-2">
                                                {q.question}
                                            </label>
                                            <textarea
                                                value={answers[idx] || ''}
                                                onChange={(e) => setAnswers(prev => ({...prev, [idx]: e.target.value}))}
                                                placeholder={q.placeholder}
                                                className="w-full h-24 bg-white/5 text-white placeholder-slate-500 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 border border-white/10 resize-none"
                                            />
                                        </div>
                                    ))}
                                </div>

                                <div className="flex gap-4 mt-8">
                                    <button
                                        onClick={resetAll}
                                        className="flex-1 bg-white/5 text-slate-300 font-medium py-3.5 rounded-xl hover:bg-white/10 transition-all border border-white/10"
                                    >
                                        ← Start Over
                                    </button>
                                    <button
                                        onClick={submitIntake}
                                        className="flex-1 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-medium py-3.5 rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all"
                                    >
                                        See what might help →
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* ─── GUIDE STAGE (education + exercises) ─── */}
                        {stage === 'guide' && (
                            <div className="space-y-6 animate-fade-in">
                                {/* Question recap */}
                                <div className="bg-white/5 backdrop-blur rounded-2xl p-5 border border-white/10">
                                    <p className="text-slate-400 text-xs uppercase tracking-wider mb-2">Your dilemma</p>
                                    <p className="text-white italic">"{initialQuery}"</p>
                                    <details className="mt-3">
                                        <summary className="text-slate-500 text-xs cursor-pointer hover:text-slate-400">View intake context</summary>
                                        <div className="mt-3 space-y-2 text-sm">
                                            {generatedQuestions.map((q, idx) => (
                                                <div key={idx} className="border-l-2 border-blue-500/30 pl-3">
                                                    <p className="text-slate-400">{q.question}</p>
                                                    <p className="text-slate-500 mt-0.5">{answers[idx] || '(skipped)'}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </details>
                                </div>

                                {guideLoading ? (
                                    <div className="text-center py-16">
                                        <div className="flex justify-center mb-6">
                                            <div className="w-3 h-3 bg-indigo-400 rounded-full animate-pulse" />
                                        </div>
                                        <p className="text-white text-lg mb-2">{loadingMessage}</p>
                                        <p className="text-slate-500 text-sm">Finding what might be relevant and which exercises fit…</p>
                                    </div>
                                ) : guide ? (
                                    <>
                                        {/* Thin-input note — sharpening, not scolding */}
                                        {guide.thin_input && (
                                            <div className="bg-amber-500/5 border border-amber-400/20 rounded-2xl p-5">
                                                <p className="text-amber-100/90 text-sm leading-relaxed">
                                                    These are exercises that work across a wide range of problems. If you'd like suggestions tailored more closely to your situation, it's worth running through the questions again with a bit more detail in your answers.
                                                </p>
                                            </div>
                                        )}

                                        {/* Mechanisms — gated; only renders when the engine surfaced any */}
                                        {guide.relevant_mechanisms && guide.relevant_mechanisms.length > 0 && (
                                            <div className="bg-white/5 backdrop-blur rounded-2xl p-6 border border-indigo-400/20">
                                                <h3 className="font-display text-xl text-white mb-1">What might be at play</h3>
                                                <p className="text-slate-400 text-sm mb-4">
                                                    Tendencies often relevant to situations like yours. Offered as possibilities to understand, not a diagnosis — tap any to read more.
                                                </p>
                                                <div className="flex flex-wrap gap-2">
                                                    {guide.relevant_mechanisms.map(id => {
                                                        const p = primers.find(x => x.id === id);
                                                        if (!p) return null;
                                                        return (
                                                            <button
                                                                key={id}
                                                                onClick={() => setOpenPrimerId(id)}
                                                                className="px-4 py-2 rounded-xl bg-indigo-500/10 hover:bg-indigo-500/20 text-indigo-200 text-sm border border-indigo-400/30 transition-colors"
                                                            >
                                                                {p.name} <span className="text-indigo-300/60 ml-1">→</span>
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}

                                        {/* Exercises */}
                                        <div>
                                            <div className="mb-4">
                                                <h3 className="font-display text-xl text-white mb-1">Exercises you can work through</h3>
                                                <p className="text-slate-400 text-sm">
                                                    Established techniques from evidence-based traditions. You do the thinking — the tool just sets you up.
                                                </p>
                                            </div>
                                            <div className="space-y-4">
                                                {guide.exercises.map((ex, idx) => (
                                                    <div
                                                        key={idx}
                                                        className="bg-white/5 backdrop-blur rounded-2xl p-6 border border-white/10 animate-fade-in"
                                                        style={{animationDelay: `${idx * 100}ms`}}
                                                    >
                                                        <div className="flex items-center gap-2 mb-2 flex-wrap">
                                                            <h4 className="text-lg font-semibold text-white">{ex.name}</h4>
                                                            {ex.tradition && (
                                                                <span className="px-2 py-0.5 rounded-full bg-slate-500/15 text-slate-300 text-xs border border-slate-400/20">
                                                                    {ex.tradition}
                                                                </span>
                                                            )}
                                                        </div>
                                                        {ex.one_line && <p className="text-slate-300 text-[15px] mb-2">{ex.one_line}</p>}
                                                        {ex.why_it_fits && (
                                                            <p className="text-slate-400 text-sm mb-4">
                                                                <span className="text-slate-500">Why this might fit: </span>{ex.why_it_fits}

                                                            Start this exercise →
                                                        </button>
                                                    </div>

                                        <div className="bg-white/5 rounded-2xl p-5 border border-white/10">

                                                Working on a recurring pattern in yourself rather than a single decision?{' '}
                                                <a href="https://www.cognitivecounsel.com" target="_blank" rel="noopener" className="text-indigo-300 hover:text-indigo-200 underline">
                                                    Cognitive Counsel
                                                </a>{' '}is a companion space for the bigger patterns beneath specific dilemmas — also being reworked in this same spirit.
                                            </p>
                                        </div>

                                        <button
                                            onClick={resetAll}
                                            className="text-slate-500 text-xs hover:text-slate-400 underline"
                                        >
                                            Start over with a new dilemma
                                        </button>
                                    </>
                                ) : null}
                            </div>

                        {/* ─── EXERCISE STAGE (interactive step-through) ─── */}
                        {stage === 'exercise' && (
                            <div className="space-y-6 animate-fade-in">
                                <button
                                    onClick={() => setStage('guide')}
                                    className="text-slate-400 text-sm hover:text-slate-200 transition-colors"
                                >
                                    ← Back to exercises
                                </button>

                                {exerciseLoading ? (
                                    <div className="text-center py-16">
                                        <div className="flex justify-center mb-6">
                                            <div className="w-3 h-3 bg-indigo-400 rounded-full animate-pulse" />
                                        </div>
                                        <p className="text-white text-lg mb-2">Setting up {activeExercise?.name}…</p>
                                        <p className="text-slate-500 text-sm">This is yours to fill in.</p>
                                    </div>
                                ) : exerciseData && exerciseData.error ? (
                                    <div className="bg-rose-500/10 border border-rose-500/20 rounded-2xl p-6 text-center">
                                        <p className="text-rose-200 mb-4">This exercise didn't load.</p>
                                        <button
                                            onClick={() => startExercise(activeExercise)}
                                            className="px-5 py-2 bg-rose-500/20 text-rose-100 text-sm rounded-xl hover:bg-rose-500/30 transition-colors border border-rose-500/30"
                                        >Try again</button>
                                    </div>
                                ) : exerciseData ? (
                                    <>
                                        {/* Header */}
                                        <div>
                                            <div className="flex items-center gap-2 mb-2 flex-wrap">
                                                <h2 className="font-display text-2xl text-white">{exerciseData.name}</h2>
                                                {exerciseData.tradition && (
                                                    <span className="px-2 py-0.5 rounded-full bg-slate-500/15 text-slate-300 text-xs border border-slate-400/20">
                                                        {exerciseData.tradition}
                                                    </span>
                                                )}
                                            </div>
                                            {exerciseData.intro && <p className="text-slate-400 text-[15px] leading-relaxed">{exerciseData.intro}</p>}
                                        </div>

                                        {!onReview ? (
                                            <>
                                                {/* Progress */}
                                                <div className="flex items-center gap-3">
                                                    <div className="flex-1 h-1.5 bg-white/10 rounded-full overflow-hidden">
                                                        <div
                                                            className="h-full bg-gradient-to-r from-blue-400 to-indigo-500 transition-all duration-500"
                                                            style={{width: `${(exerciseStepIndex / exerciseTotalSteps) * 100}%`}}
                                                        />
                                                    </div>
                                                    <span className="text-slate-500 text-xs whitespace-nowrap">Step {exerciseStepIndex + 1} of {exerciseTotalSteps}</span>
                                                </div>

                                                {/* Current step */}
                                                {(() => {
                                                    const step = exerciseData.steps[exerciseStepIndex];
                                                    return (
                                                        <div className="bg-white/5 backdrop-blur rounded-2xl p-6 border border-white/10">
                                                            <p className="text-white font-medium mb-2 leading-relaxed">{step.prompt}</p>
                                                            {step.guidance && <p className="text-slate-400 text-sm mb-3">{step.guidance}</p>}
                                                            <textarea
                                                                value={exerciseAnswers[exerciseStepIndex] || ''}
                                                                onChange={(e) => setExerciseAnswers(prev => ({...prev, [exerciseStepIndex]: e.target.value}))}
                                                                placeholder={step.placeholder || 'Take your time…'}
                                                                className="w-full h-36 bg-white/5 text-white placeholder-slate-600 rounded-xl p-4 focus:outline-none focus:ring-2 focus:ring-blue-500/50 border border-white/10 resize-none"
                                                                autoFocus
                                                            />
                                                        </div>
                                                    );
                                                })()}

                                                {/* Navigation */}
                                                <div className="flex gap-4">
                                                    <button
                                                        onClick={() => setExerciseStepIndex(i => Math.max(0, i - 1))}
                                                        disabled={exerciseStepIndex === 0}
                                                        className="flex-1 bg-white/5 text-slate-300 font-medium py-3.5 rounded-xl hover:bg-white/10 transition-all border border-white/10 disabled:opacity-30"
                                                    >
                                                        ← Back
                                                    </button>
                                                    <button
                                                        onClick={() => setExerciseStepIndex(i => i + 1)}
                                                        className="flex-1 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-medium py-3.5 rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all"
                                                    >
                                                        {exerciseStepIndex === exerciseTotalSteps - 1 ? 'Finish →' : 'Continue →'}
                                                    </button>
                                                </div>
                                            </>
                                        ) : (
                                            /* Review — the user's own words, no AI interpretation (open loop) */
                                            <>
                                                <div className="bg-white/5 backdrop-blur rounded-2xl p-6 border border-white/10 space-y-4">
                                                    <h3 className="text-lg font-semibold text-white">What you wrote</h3>
                                                    {exerciseData.steps.map((s, i) => (
                                                        <div key={i} className="border-l-2 border-indigo-500/30 pl-4">
                                                            <p className="text-slate-400 text-sm mb-1">{s.prompt}</p>
                                                            <p className="text-slate-200 text-[15px] whitespace-pre-wrap">{exerciseAnswers[i]?.trim() || <span className="text-slate-600 italic">(left blank)</span>}</p>
                                                        </div>
                                                    ))}
                                                </div>

                                                {exerciseData.closing && (
                                                    <div className="bg-indigo-500/5 border border-indigo-400/20 rounded-2xl p-5">
                                                        <p className="text-indigo-100/90 text-[15px] leading-relaxed">{exerciseData.closing}</p>
                                                    </div>
                                                )}

                                                <p className="text-slate-500 text-xs text-center">
                                                    These are your words. Nothing here is sent off for analysis — what you do with them is yours.
                                                </p>

                                                <div className="flex gap-3">
                                                    <button onClick={copyExercise} className="flex-1 bg-white/5 text-slate-300 font-medium py-3 rounded-xl hover:bg-white/10 transition-all border border-white/10 text-sm">
                                                        📋 Copy my work
                                                    </button>
                                                    <button onClick={downloadExercisePDF} className="flex-1 bg-white/5 text-slate-300 font-medium py-3 rounded-xl hover:bg-white/10 transition-all border border-white/10 text-sm">
                                                        📄 Download PDF
                                                    </button>
                                                </div>

                                                <div className="flex gap-4">
                                                    <button
                                                        onClick={() => setExerciseStepIndex(exerciseTotalSteps - 1)}
                                                        className="flex-1 bg-white/5 text-slate-300 font-medium py-3.5 rounded-xl hover:bg-white/10 transition-all border border-white/10"
                                                    >
                                                        ← Revisit my answers
                                                    </button>
                                                    <button
                                                        onClick={() => setStage('guide')}
                                                        className="flex-1 bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-medium py-3.5 rounded-xl hover:from-blue-600 hover:to-indigo-600 transition-all"
                                                    >
                                                        Try another exercise →
                                                    </button>
                                                </div>
                                            </>
                                        )}
                                    </>
                                ) : null}
                            </div>
                        )}

                        {/* ─── Footer ─── */}
                        {stage !== 'welcome' && (
                            <div className="mt-12 pt-6 border-t border-white/5">
                                <div className="text-center space-y-3">
                                    <p className="text-slate-600 text-xs">
                                        <strong className="text-slate-500">Privacy:</strong> Your answers and exercise responses stay in your browser. The questions and exercise scaffolds are generated through Anthropic's Claude API; nothing you write is stored by this application. Anthropic retains API conversations for 30 days for safety monitoring.{' '}
                                        <a href="https://www.anthropic.com/legal/privacy" target="_blank" rel="noopener noreferrer" className="text-blue-500/50 hover:text-blue-400">
                                            Learn more
                                        </a>
                                    </p>
                                    <p className="text-slate-700 text-xs">
                                        Created by Nicole Scheid & Claude (Anthropic) · v3.0
                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CognitiveCouncil />, document.getElementById('root'));
    </script>
</body>
</html>
