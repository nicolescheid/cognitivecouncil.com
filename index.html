                                                        <p className="text-slate-400 text-sm italic mt-4 animate-pulse">Expanding perspective...</p>
                                                    ) : expandedContent[system.id] ? (
                                                        <div className="mt-4 pt-4 border-t border-white/10">
                                                            <div
                                                                className="system-output text-slate-300 leading-relaxed text-[15px]"
                                                                dangerouslySetInnerHTML={{ __html: renderMarkdown(expandedContent[system.id]) }}
                                                            />
                                                        </div>
                                                    ) : null}
                                                </div>

                                                {/* Refine input */}
                                                <div className={`refine-input ${refineOpen[system.id] ? 'open' : ''}`}>
                                                    <div className="mt-4 pt-4 border-t border-white/10">
                                                        <p className="text-slate-400 text-xs mb-2">Add context or correction — this system will re-examine:</p>
                                                        <textarea
                                                            value={refineText[system.id] || ''}
                                                            onChange={(e) => setRefineText(prev => ({...prev, [system.id]: e.target.value}))}
                                                            placeholder="Actually, the situation is more like... / What you're missing is..."
                                                            className="w-full h-20 bg-white/5 text-white placeholder-slate-600 rounded-lg p-3 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500/50 border border-white/10 resize-none"
                                                        />
                                                        <button
                                                            onClick={() => handleRefine(system.id)}
                                                            disabled={!refineText[system.id]?.trim() || refineLoading[system.id]}
                                                            className="mt-2 px-4 py-1.5 bg-blue-500/20 text-blue-300 text-sm rounded-lg hover:bg-blue-500/30 transition-colors disabled:opacity-40"
                                                        >
                                                            {refineLoading[system.id] ? 'Refining...' : 'Refine this perspective'}
                                                        </button>
                                                    </div>
                                                </div>

                                                {/* Follow-up responses */}
                                                {followUpResponses[system.id]?.map((followUp, fIdx) => (
                                                    <div key={fIdx} className="mt-4 pt-4 border-t border-white/10">
                                                        <p className="text-blue-300 text-xs mb-2">Follow-up: {followUp.question}</p>
                                                        <div className="system-output text-slate-300 text-sm leading-relaxed bg-white/5 rounded-lg p-3"
                                                            dangerouslySetInnerHTML={{ __html: renderMarkdown(followUp.response) }}
                                                        />
                                                    </div>
                                                ))}

                                                {/* Action row: Expand / Refine / Reactions — only when card is loaded successfully AND Prefrontal has anchored */}
                                                {!system.loading && !system.error && (system.id === 'prefrontal' || prefrontalHasLanded) && (
                                                    <div className="mt-4 pt-4 border-t border-white/10">
                                                        {/* Expand & Refine buttons */}
                                                        <div className="flex gap-2 mb-3">
                                                            <button
                                                                onClick={() => handleExpand(system.id)}
                                                                className="px-3 py-1.5 text-xs rounded-lg bg-white/5 text-slate-400 hover:text-white hover:bg-white/10 transition-colors border border-white/10"
                                                            >
                                                                {expandedSystems[system.id] ? 'Collapse' : 'Tell me more about this'}
                                                            </button>
                                                            <button
                                                                onClick={() => setRefineOpen(prev => ({...prev, [system.id]: !prev[system.id]}))}
                                                                className="px-3 py-1.5 text-xs rounded-lg bg-white/5 text-slate-400 hover:text-white hover:bg-white/10 transition-colors border border-white/10"
                                                            >
                                                                {refineOpen[system.id] ? 'Cancel' : "I'd like to add context"}
                                                            </button>
                                                        </div>

                                                        {/* Reactions */}
                                                        <p className="text-slate-500 text-xs mb-2">How does this land?</p>
                                                        <div className="flex flex-wrap gap-1.5">
                                                            {reactions.map(r => (
                                                                <button
                                                                    key={r.value}
                                                                    onClick={() => handleReaction(system.id, r.value)}
                                                                    className={`px-2.5 py-1.5 rounded-lg text-xs transition-all ${
                                                                        userReactions[system.id] === r.value
                                                                            ? r.value === 'probably-right'
                                                                                ? 'bg-amber-500/30 text-amber-200 ring-1 ring-amber-500/50'
                                                                                : 'bg-blue-500/30 text-blue-200 ring-1 ring-blue-500/50'
                                                                            : 'bg-white/5 text-slate-400 hover:bg-white/10 hover:text-slate-300'
                                                                    }`}
                                                                >
                                                                    <span className="mr-1">{r.emoji}</span>
                                                                    {r.label}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}

                                        {allComplete && successfulResponses.length > 0 && (<>
                                        {/* ─── Export ─── */}
                                        <div className="bg-white/5 backdrop-blur rounded-2xl p-5 border border-white/10">
                                            {anyErrored && (
                                                <p className="text-amber-300/80 text-xs mb-3">Some perspectives didn't load — exports include only the successful ones.</p>
                                            )}
                                            <div className="flex gap-3">
                                                <button onClick={copyToClipboard} className="flex-1 bg-white/5 text-slate-300 font-medium py-3 rounded-xl hover:bg-white/10 transition-all border border-white/10 text-sm">
                                                    📋 Copy to Clipboard
                                                </button>
                                                <button onClick={downloadPDF} className="flex-1 bg-white/5 text-slate-300 font-medium py-3 rounded-xl hover:bg-white/10 transition-all border border-white/10 text-sm">
                                                    📄 Download PDF
                                                </button>
                                            </div>
                                        </div>

                                        {/* ─── Bridge to Counsel ─── */}
                                        <div className="bg-gradient-to-br from-indigo-900/30 to-violet-900/30 rounded-2xl p-8 border border-indigo-500/20">
                                            <div className="text-center space-y-4">
                                                <h3 className="font-display text-2xl text-white">
                                                    Ready to look inward?
                                                </h3>
                                                <p className="text-slate-300 max-w-lg mx-auto">
                                                    The Council has given you perspectives on your question.
                                                    The <strong className="text-indigo-300">Cognitive Counsel</strong> can illuminate the patterns underneath — what your question reveals about <em>you</em>.
                                                </p>
                                                {Object.values(userReactions).includes('probably-right') && (
                                                    <p className="text-amber-300/80 text-sm italic">
                                                        You flagged something you're not ready to admit. That's exactly where the pattern lives.
                                                    </p>
                                                )}
                                                <div className="flex justify-center pt-2">
                                                    <button
                                                        onClick={transferToCounsel}
                                                        disabled={transferring}
                                                        className="px-8 py-3 bg-gradient-to-r from-indigo-500 to-violet-500 text-white font-medium rounded-xl hover:from-indigo-600 hover:to-violet-600 transition-all shadow-lg shadow-indigo-500/20 disabled:opacity-50"
                                                    >
                                                        {transferring ? 'Transferring...' : 'Take this to Counsel →'}
                                                    </button>
                                                </div>
                                                <p className="text-slate-600 text-xs pt-4">
                                                    Different mode. Deeper questions. Pattern illumination.
                                                </p>
                                                <button
                                                    onClick={resetForum}
                                                    className="text-slate-500 text-xs hover:text-slate-400 underline mt-2"
                                                >
                                                    Or start over with a new question
                                                </button>
                                            </div>
                                        </div>
                                        </>)}
                            </div>
                        )}

                        {/* ─── Footer ─── */}
                        {stage !== 'welcome' && (
                            <div className="mt-12 pt-6 border-t border-white/5">
                                <div className="text-center space-y-3">
                                    <p className="text-slate-600 text-xs">
                                        <strong className="text-slate-500">Privacy:</strong> Conversations are processed through Anthropic's Claude API. 
                                        No data is stored by this application. Retained by Anthropic for 30 days for safety monitoring.{' '}
                                        <a href="https://www.anthropic.com/legal/privacy" target="_blank" rel="noopener noreferrer" className="text-blue-500/50 hover:text-blue-400">
                                            Learn more
                                        </a>
                                    </p>
                                    <p className="text-slate-700 text-xs">
                                        Created by Nicole Scheid & Claude (Anthropic) · v2.4                                    </p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        ReactDOM.render(<CognitiveCouncil />, document.getElementById('root'));
    </script>
</body>
</html>
